name: WebDAV to OSS

on:
  workflow_dispatch:
    inputs:
      file_concurrency:
        description: "How many files to process at once"
        required: false
        default: "3"
      part_concurrency:
        description: "Multipart upload concurrency per large file"
        required: false
        default: "8"
      part_size_mb:
        description: "Multipart part size in MB"
        required: false
        default: "64"
      large_file_mb:
        description: "Use multipart when file is at least this MB"
        required: false
        default: "128"
      skip_existing:
        description: "Skip OSS objects with the same byte size"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      shard_total:
        description: "Total parallel shards"
        required: false
        default: "1"
      shard_index:
        description: "This shard index, 0-based"
        required: false
        default: "0"

permissions:
  contents: read


jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
      WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
      WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
      WEBDAV_ROOT: ${{ secrets.WEBDAV_ROOT }}
      OSS_ENDPOINT: oss-cn-hongkong.aliyuncs.com
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
      FILE_CONCURRENCY: ${{ inputs.file_concurrency }}
      PART_CONCURRENCY: ${{ inputs.part_concurrency }}
      PART_SIZE_MB: ${{ inputs.part_size_mb }}
      LARGE_FILE_MB: ${{ inputs.large_file_mb }}
      SKIP_EXISTING: ${{ inputs.skip_existing }}
      SHARD_TOTAL: ${{ inputs.shard_total }}
      SHARD_INDEX: ${{ inputs.shard_index }}
    steps:
      - name: Native WebDAV to OSS multipart upload
        shell: bash
        run: |
          set -euo pipefail
          cat > migrate.mjs <<'NODE'
          import crypto from 'node:crypto';
          import { setTimeout as sleep } from 'node:timers/promises';

          const cfg = {
            webdavUrl: must('WEBDAV_URL').replace(/\/$/, ''),
            webdavUser: must('WEBDAV_USER'),
            webdavPass: must('WEBDAV_PASS'),
            webdavRoot: must('WEBDAV_ROOT').replace(/\/$/, ''),
            endpoint: must('OSS_ENDPOINT'),
            bucket: must('OSS_BUCKET'),
            accessKeyId: must('OSS_ACCESS_KEY_ID'),
            accessKeySecret: must('OSS_ACCESS_KEY_SECRET'),
            fileConcurrency: Number(process.env.FILE_CONCURRENCY || 3),
            partConcurrency: Number(process.env.PART_CONCURRENCY || 8),
            partSize: Number(process.env.PART_SIZE_MB || 64) * 1024 * 1024,
            largeCutoff: Number(process.env.LARGE_FILE_MB || 128) * 1024 * 1024,
            skipExisting: (process.env.SKIP_EXISTING || 'true') === 'true',
            shardTotal: Math.max(1, Number(process.env.SHARD_TOTAL || 1)),
            shardIndex: Math.max(0, Number(process.env.SHARD_INDEX || 0)),
          };

          function must(name) {
            const value = process.env[name];
            if (!value) throw new Error('Missing env ' + name);
            return value;
          }
          const webdavAuth = 'Basic ' + Buffer.from(cfg.webdavUser + ':' + cfg.webdavPass).toString('base64');
          const xmlDecode = s => s.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&apos;/g, "'");
          const encodePath = p => p.split('/').map((s, i) => i === 0 ? '' : encodeURIComponent(s)).join('/');
          const ossEncode = s => encodeURIComponent(s).replace(/[!'()*]/g, c => '%' + c.charCodeAt(0).toString(16).toUpperCase());
          const ossPath = key => '/' + key.split('/').map(ossEncode).join('/');
          const hrefToPath = href => {
            let h = xmlDecode(href.trim());
            try { h = decodeURIComponent(h); } catch {}
            if (h.startsWith('/webdav')) h = h.slice('/webdav'.length);
            return h;
          };
          function canonicalizedOSSHeaders(headers) {
            return Object.entries(headers)
              .filter(([k]) => k.toLowerCase().startsWith('x-oss-'))
              .map(([k, v]) => [k.toLowerCase(), String(v).trim()])
              .sort(([a], [b]) => a.localeCompare(b))
              .map(([k, v]) => k + ':' + v + '\n')
              .join('');
          }
          function sign(method, key, query = '', headers = {}, contentType = '', contentMd5 = '') {
            const date = new Date().toUTCString();
            headers.Date = date;
            const resource = '/' + cfg.bucket + '/' + key + (query ? '?' + query : '');
            const stringToSign = [method, contentMd5, contentType, date, canonicalizedOSSHeaders(headers) + resource].join('\n');
            const sig = crypto.createHmac('sha1', cfg.accessKeySecret).update(stringToSign, 'utf8').digest('base64');
            headers.Authorization = 'OSS ' + cfg.accessKeyId + ':' + sig;
            if (contentType) headers['Content-Type'] = contentType;
            return headers;
          }
          async function retry(name, fn, attempts = 5) {
            let last;
            for (let i = 1; i <= attempts; i++) {
              try { return await fn(); } catch (e) {
                last = e;
                if (i === attempts) break;
                const wait = Math.min(30000, 1000 * 2 ** (i - 1));
                console.warn('retry', i, name, e.message, 'waiting', wait + 'ms');
                await sleep(wait);
              }
            }
            throw last;
          }
          async function webdavFetch(path, opts = {}) {
            const res = await fetch(cfg.webdavUrl + encodePath(path), { ...opts, headers: { Authorization: webdavAuth, ...(opts.headers || {}) } });
            if (!res.ok && res.status !== 206 && res.status !== 207) {
              const body = await res.text().catch(() => '');
              throw new Error((opts.method || 'GET') + ' WebDAV ' + path + ' -> ' + res.status + ' ' + body.slice(0, 300));
            }
            return res;
          }
          async function listDir(path) {
            const p = path.endsWith('/') ? path : path + '/';
            const res = await retry('PROPFIND ' + p, () => webdavFetch(p, { method: 'PROPFIND', headers: { Depth: '1' } }));
            const text = await res.text();
            const blocks = text.match(/<[^>]*response[\s\S]*?<\/[^>]*response>/gi) || [];
            return blocks.map(b => {
              const href = (b.match(/<[^>]*href[^>]*>([\s\S]*?)<\/[^>]*href>/i) || [])[1] || '';
              const itemPath = hrefToPath(href);
              const len = (b.match(/<[^>]*getcontentlength[^>]*>([\s\S]*?)<\/[^>]*getcontentlength>/i) || [])[1];
              const resType = (b.match(/<[^>]*resourcetype[^>]*>([\s\S]*?)<\/[^>]*resourcetype>/i) || [])[1] || '';
              const collection = /collection/i.test(resType) || itemPath.endsWith('/');
              return { path: itemPath, collection, size: len ? Number(len) : 0 };
            }).filter(x => x.path && x.path.replace(/\/$/, '') !== p.replace(/\/$/, ''));
          }
          async function collectFiles(root) {
            const dirs = [root];
            const files = [];
            while (dirs.length) {
              const dir = dirs.shift();
              console.log('scan', dir);
              for (const item of await listDir(dir)) {
                if (item.collection) dirs.push(item.path);
                else files.push(item);
              }
            }
            return files;
          }
          function targetKey(srcPath) {
            return srcPath.slice(cfg.webdavRoot.length).replace(/^\/+/, '');
          }
          function shardOf(key) {
            const h = crypto.createHash('sha1').update(key).digest();
            return h.readUInt32BE(0) % cfg.shardTotal;
          }
          async function ossRequest(method, key, query = '', headers = {}, body = undefined, contentType = '') {
            const signed = sign(method, key, query, headers, contentType);
            const url = 'https://' + cfg.bucket + '.' + cfg.endpoint + ossPath(key) + (query ? '?' + query : '');
            const res = await fetch(url, { method, headers: signed, body });
            if (!res.ok) {
              const text = await res.text().catch(() => '');
              throw new Error(method + ' OSS ' + key + (query ? '?' + query : '') + ' -> ' + res.status + ' ' + text.slice(0, 500));
            }
            return res;
          }
          async function headObject(key) {
            const signed = sign('HEAD', key);
            const url = 'https://' + cfg.bucket + '.' + cfg.endpoint + ossPath(key);
            const res = await fetch(url, { method: 'HEAD', headers: signed });
            if (res.ok) return { exists: true, size: Number(res.headers.get('content-length') || -1) };
            if (res.status === 404) return { exists: false, size: -1 };
            if (res.status === 403) return { exists: null, size: -1 };
            const text = await res.text().catch(() => '');
            throw new Error('HEAD OSS ' + key + ' -> ' + res.status + ' ' + text.slice(0, 300));
          }
          async function readRange(path, start, end) {
            const res = await retry('GET range ' + path + ' ' + start + '-' + end, () => webdavFetch(path, { headers: { Range: 'bytes=' + start + '-' + end } }));
            return Buffer.from(await res.arrayBuffer());
          }
          async function uploadSmall(file, key) {
            if (file.size === 0) {
              await retry('PUT empty ' + key, () => ossRequest('PUT', key, '', {}, Buffer.alloc(0), 'application/octet-stream'));
              return;
            }
            const buf = Buffer.from(await (await retry('GET ' + file.path, () => webdavFetch(file.path))).arrayBuffer());
            await retry('PUT ' + key, () => ossRequest('PUT', key, '', {}, buf, 'application/octet-stream'));
          }
          async function initMultipart(key) {
            const res = await retry('init multipart ' + key, () => ossRequest('POST', key, 'uploads', {}, undefined, ''));
            const text = await res.text();
            const uploadId = (text.match(/<UploadId>([\s\S]*?)<\/UploadId>/) || [])[1];
            if (!uploadId) throw new Error('Missing UploadId for ' + key + ': ' + text.slice(0, 300));
            return uploadId;
          }
          async function uploadPart(file, key, uploadId, partNumber, start, end) {
            const buf = await readRange(file.path, start, end);
            const query = 'partNumber=' + partNumber + '&uploadId=' + encodeURIComponent(uploadId);
            const res = await retry('upload part ' + key + ' #' + partNumber, () => ossRequest('PUT', key, query, {}, buf, 'application/octet-stream'));
            const etag = res.headers.get('etag');
            if (!etag) throw new Error('Missing ETag for ' + key + ' part ' + partNumber);
            return { partNumber, etag };
          }
          async function completeMultipart(key, uploadId, parts) {
            parts.sort((a, b) => a.partNumber - b.partNumber);
            const xml = '<CompleteMultipartUpload>' + parts.map(p => '<Part><PartNumber>' + p.partNumber + '</PartNumber><ETag>' + p.etag + '</ETag></Part>').join('') + '</CompleteMultipartUpload>';
            await retry('complete multipart ' + key, () => ossRequest('POST', key, 'uploadId=' + encodeURIComponent(uploadId), {}, xml, 'application/xml'));
          }
          async function abortMultipart(key, uploadId) {
            try { await ossRequest('DELETE', key, 'uploadId=' + encodeURIComponent(uploadId)); } catch (e) { console.warn('abort failed', key, e.message); }
          }
          async function uploadLarge(file, key) {
            const uploadId = await initMultipart(key);
            try {
              const jobs = [];
              let partNumber = 1;
              for (let start = 0; start < file.size; start += cfg.partSize) {
                const end = Math.min(file.size - 1, start + cfg.partSize - 1);
                jobs.push({ partNumber: partNumber++, start, end });
              }
              const parts = [];
              await runPool(jobs, cfg.partConcurrency, async job => {
                const part = await uploadPart(file, key, uploadId, job.partNumber, job.start, job.end);
                parts.push(part);
                console.log('part', key, job.partNumber + '/' + jobs.length, Math.round((job.end + 1) / file.size * 100) + '%');
              });
              await completeMultipart(key, uploadId, parts);
            } catch (e) {
              await abortMultipart(key, uploadId);
              throw e;
            }
          }
          async function runPool(items, limit, worker) {
            let index = 0;
            const workers = Array.from({ length: Math.min(limit, items.length) }, async () => {
              while (index < items.length) {
                const item = items[index++];
                await worker(item);
              }
            });
            await Promise.all(workers);
          }
          async function uploadFile(file) {
            const key = targetKey(file.path);
            const sizeMb = (file.size / 1024 / 1024).toFixed(1);
            const started = Date.now();
            if (cfg.skipExisting) {
              const head = await retry('HEAD ' + key, () => headObject(key), 2);
              if (head.exists === true && head.size === file.size) {
                console.log('skip existing', key, sizeMb + 'MB');
                return;
              }
            }
            console.log('upload start', key, sizeMb + 'MB');
            if (file.size >= cfg.largeCutoff) await uploadLarge(file, key);
            else await uploadSmall(file, key);
            const sec = Math.max(0.001, (Date.now() - started) / 1000);
            console.log('upload done', key, sizeMb + 'MB', (file.size / 1024 / 1024 / sec).toFixed(2) + 'MB/s');
          }

          console.log('config', JSON.stringify({ root: cfg.webdavRoot, bucket: cfg.bucket, endpoint: cfg.endpoint, fileConcurrency: cfg.fileConcurrency, partConcurrency: cfg.partConcurrency, partSizeMB: cfg.partSize / 1024 / 1024, largeFileMB: cfg.largeCutoff / 1024 / 1024, skipExisting: cfg.skipExisting, shardTotal: cfg.shardTotal, shardIndex: cfg.shardIndex }));
          const allFiles = await collectFiles(cfg.webdavRoot);
          if (cfg.shardIndex >= cfg.shardTotal) throw new Error('shard_index must be less than shard_total');
          const files = allFiles.filter(f => shardOf(targetKey(f.path)) === cfg.shardIndex);
          const total = files.reduce((n, f) => n + f.size, 0);
          console.log('found files', allFiles.length, 'selected', files.length, 'shard', cfg.shardIndex + '/' + cfg.shardTotal, 'selectedGB', (total / 1024 / 1024 / 1024).toFixed(2));
          await runPool(files, cfg.fileConcurrency, uploadFile);
          console.log('all uploads complete');
          NODE
          node migrate.mjs
